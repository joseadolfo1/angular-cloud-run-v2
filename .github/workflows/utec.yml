name: Deploy to Google Cloud Run - Service Account Key (Multi-User)

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: "utec-posgrado-01"
  GCP_REGION: "us-central1"
  ARTIFACT_REGISTRY_REPO: "app-gemini" 

jobs:
  # 1. JOB DE CONSTRUCCIÓN Y DESPLIEGUE INICIAL / CANARY (10%)
  build_and_canary:
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    outputs:
      is_first_deploy: ${{ steps.check_service.outputs.is_first_deploy }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (JSON Key)
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Check if Service Exists
        id: check_service
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          if gcloud run services describe "$SERVICE_NAME" --region ${{ env.GCP_REGION }} >/dev/null 2>&1; then
            echo "is_first_deploy=false" >> $GITHUB_OUTPUT
            echo "El servicio ya existe. Procediendo con Canary (10%)."
          else
            echo "is_first_deploy=true" >> $GITHUB_OUTPUT
            echo "Primera vez. Se enviará el 100% del tráfico."
          fi

      - name: Build and Deploy (Canary logic)
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/app-${{ secrets.ALUMNO_ID }}:${{ github.sha }}"

          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

          if [ "${{ steps.check_service.outputs.is_first_deploy }}" = "true" ]; then
            gcloud run deploy "$SERVICE_NAME" \
              --image "$IMAGE_TAG" \
              --region ${{ env.GCP_REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --set-env-vars="ENVIRONMENT_NAME=${{ secrets.ENVIRONMENT_NAME }}"
          else
            # 1. Capturar la revisión anterior
            PREVIOUS_REV=$(gcloud run services describe "$SERVICE_NAME" --region ${{ env.GCP_REGION }} --format="value(status.latestReadyRevisionName)")

            # 2. Desplegar sin tráfico
            gcloud run deploy "$SERVICE_NAME" \
              --image "$IMAGE_TAG" \
              --region ${{ env.GCP_REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --no-traffic \
              --set-env-vars="ENVIRONMENT_NAME=${{ secrets.ENVIRONMENT_NAME }}"
            
            # 3. Capturar nueva revisión
            CANARY_REV=$(gcloud run services describe "$SERVICE_NAME" --region ${{ env.GCP_REGION }} --format="value(status.latestCreatedRevisionName)")
            
            # 4. Aplicar 90% / 10%
            gcloud run services update-traffic "$SERVICE_NAME" \
              --region ${{ env.GCP_REGION }} \
              --to-revisions="$PREVIOUS_REV=90,$CANARY_REV=10"
          fi

  # 2. JOB DE APROBACIÓN MANUAL
  promote_or_rollback:
    needs: build_and_canary
    if: needs.build_and_canary.outputs.is_first_deploy == 'false'
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Promote Canary to 100% Traffic
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          
          # Buscamos de forma dinámica cuál fue la última revisión creada (el Canary)
          CANARY_REV=$(gcloud run services describe "$SERVICE_NAME" --region ${{ env.GCP_REGION }} --format="value(status.latestCreatedRevisionName)")
          
          echo "Promoviendo la revisión $CANARY_REV al 100% de tráfico."
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region ${{ env.GCP_REGION }} \
            --to-revisions="$CANARY_REV=100"

  # 3. JOB AUTOMÁTICO EN CASO DE RECHAZO O FALLO (ROLLBACK)
  rollback_canary:
    needs: [build_and_canary, promote_or_rollback]
    if: always() && needs.build_and_canary.outputs.is_first_deploy == 'false' && (needs.promote_or_rollback.result == 'denied' || needs.promote_or_rollback.result == 'failed')
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Rollback Traffic (Remove Canary)
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          
          # Obtenemos la revisión Canary para filtrarla
          CANARY_REV=$(gcloud run services describe "$SERVICE_NAME" --region ${{ env.GCP_REGION }} --format="value(status.latestCreatedRevisionName)")
          
          # Obtenemos todas las revisiones que actualmente tienen tráfico (devolverá la estable y la canary juntas)
          TRAFFIC_REVS=$(gcloud run services describe "$SERVICE_NAME" --region ${{ env.GCP_REGION }} --format="value(status.traffic.revisionName)")
          
          # Filtramos la revisión Canary para quedarnos SOLO con el nombre de la versión estable
          STABLE_REV=$(echo $TRAFFIC_REVS | tr ';' ' ' | tr ',' ' ' | sed "s/$CANARY_REV//g" | awk '{print $1}')
          
          echo "El despliegue falló/fue cancelado. Revirtiendo el 100% a la versión estable: $STABLE_REV"
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region ${{ env.GCP_REGION }} \
            --to-revisions="$STABLE_REV=100"
            